services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: agent_bill
      POSTGRES_PASSWORD: agent_bill
      POSTGRES_USER: agent_bill
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U agent_bill -d agent_bill']
      interval: 5s
      retries: 20
      timeout: 5s
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
